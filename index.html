<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Homepage</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 50px;
      background: #111;
      color: #fff;
    }

    nav ul {
      display: flex;
      list-style: none;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
    }

    .hero {
      background: url('https://via.placeholder.com/1600x500') no-repeat center/cover;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .hero h2 {
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      font-size: 40px;
    }

    .products {
      padding: 40px;
    }

    .products h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .product {
      border: 1px solid #ddd;
      padding: 15px;
      text-align: center;
      border-radius: 10px;
      transition: 0.3s;
    }

    .product:hover {
      transform: scale(1.05);
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .product button {
      padding: 10px;
      background: #111;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: white;
      margin-top: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
      }

      nav ul {
        flex-direction: column;
        margin-top: 10px;
      }

      nav ul li {
        margin: 10px 0;
      }

      .hero h2 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>ShopEase</h1>
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <h2>Best Deals Online</h2>
</section>

<section class="products">
  <h2>Featured Products</h2>

  <div class="product-grid">

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Product 1</h3>
      <p>$25</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Product 2</h3>
      <p>$40</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Product 3</h3>
      <p>$60</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Product 4</h3>
      <p>$80</p>
      <button>Add to Cart</button>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 ShopEase</p>
</footer>

</body>
</html>
